name: Release

on:
  push:
    tags:
      - 'v*.*.*'

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Create Release
        uses: ncipollo/release-action@v1
        with:
          tag: ${{ github.ref_name }}
          name: Release ${{ github.ref_name }}
          body: |
            ## ChatLog Release ${{ github.ref_name }}

            Automated release of ChatLog - Conversation Management System.

            For installation instructions, see [INSTALL.bat](INSTALL.bat).
          draft: false
          prerelease: false
